worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # 1. Gzip Compression (Observe via curl -H "Accept-Encoding: gzip" -I http://localhost/)
    gzip on;
    gzip_comp_level 5;
    gzip_types text/plain;

    # 2. Proxy Cache Path Setup
    # Path: /var/cache/nginx | keys_zone: my_cache (10MB space for keys) 
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=my_cache:10m max_size=1g inactive=60m use_temp_path=off;

    upstream backend_pool {
        server backend:8080;
        
        # 3. Maintain up to 32 idle connections to the upstream servers
        keepalive 32; 
    }

    server {
        listen 80;

        location / {
            # 4. Applying NGINX Cache 
            proxy_cache my_cache;
            proxy_cache_valid 200 10s;  # Cache 200 OK responses for exactly 10 seconds
            proxy_cache_lock on;        # Ensure only 1 request goes to backend on cache miss

            # 5. Connect Keepalive upstream rules
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # 6. Output Cache Status to Clients
            add_header X-Cache-Status $upstream_cache_status;

            proxy_pass http://backend_pool;
        }
    }
}
