services:
  lb:
    image: nginx:1.25-alpine
    container_name: level2_lb
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web1
      - web2

  web1:
    image: hashicorp/http-echo
    container_name: level2_web1
    command: -text="Hello from Backend Web Server 1" -listen=:8080

  web2:
    image: hashicorp/http-echo
    container_name: level2_web2
    command: -text="Hello from Backend Web Server 2" -listen=:8080
