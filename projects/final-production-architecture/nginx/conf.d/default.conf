upstream web_pool {
    least_conn; # Better for varying response times
    server web_app1:8080 max_fails=3 fail_timeout=30s;
    server web_app2:8080 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream payment_api {
    server api_payment:8080;
    keepalive 16;
}

# HTTP Redirect Block
server {
    listen 80;
    server_name localhost;
    # 301 Permanent Redirect to HTTPS
    return 301 https://$host$request_uri;
}

# Main HTTPS Server Block
server {
    listen 443 ssl http2;
    server_name localhost;

    ssl_certificate /etc/nginx/ssl/nginx-selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx-selfsigned.key;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 1. Frontend Route (Load Balanced + KeepAlive)
    location / {
        limit_req zone=global_limit burst=20 nodelay;
        proxy_pass http://web_pool;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. Strict API Route
    location /api/payment/ {
        limit_req zone=global_limit burst=5 nodelay; # Tighter rate limit
        proxy_pass http://payment_api/;
        proxy_set_header Host $host;
    }

    # 3. Static Assets Route (Cached)
    location /assets/ {
        proxy_cache prod_cache;
        proxy_cache_valid 200 1h; # Cache OKs for 1 hour
        add_header X-Cache-Status $upstream_cache_status;
        proxy_pass http://web_pool;
    }
}
