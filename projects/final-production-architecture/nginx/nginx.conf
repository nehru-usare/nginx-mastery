worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    server_tokens off; # Security
    sendfile on;
    tcp_nopush on;

    # Performance: Keepalive
    keepalive_timeout 65;
    
    # Performance: Gzip
    gzip on;
    gzip_comp_level 5;
    gzip_types text/plain application/json text/css application/javascript;

    # Rate Limiting
    limit_req_zone $binary_remote_addr zone=global_limit:10m rate=10r/s;
    
    # Caching
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=prod_cache:10m max_size=1g inactive=60m use_temp_path=off;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Include modular router configs
    include /etc/nginx/conf.d/*.conf;
}
