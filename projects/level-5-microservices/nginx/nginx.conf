events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/json; # Assume most responses are JSON APIs

    server {
        listen 80;
        server_name localhost;

        # 1. Frontend / Default Route
        location / {
            root /usr/share/nginx/html;
            index index.html;
            default_type text/html;
        }

        # 2. Microservice Routing (Path-Based)
        
        location /api/users/ {
            proxy_pass http://users_service:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/orders/ {
            proxy_pass http://orders_service:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/search/ {
            proxy_pass http://search_service:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Catch-all API error mapping
        location /api/ {
            return 404 '{"error": "API route not found"}';
        }
    }
}
