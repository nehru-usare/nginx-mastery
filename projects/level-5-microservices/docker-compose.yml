services:
  api_gateway:
    image: nginx:1.25-alpine
    container_name: level5_gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    depends_on:
      - users_service
      - orders_service
      - search_service

  # Microservice 1
  users_service:
    image: hashicorp/http-echo
    container_name: level5_users
    command: [ "-text", '{"service": "users", "status": "ok", "routes": ["/api/users"]}', "-listen", ":8080" ]

  # Microservice 2
  orders_service:
    image: hashicorp/http-echo
    container_name: level5_orders
    command: [ "-text", '{"service": "orders", "status": "ok", "routes": ["/api/orders"]}', "-listen", ":8080" ]

  # Microservice 3
  search_service:
    image: hashicorp/http-echo
    container_name: level5_search
    command: [ "-text", '{"service": "search", "status": "ok", "routes": ["/api/search"]}', "-listen", ":8080" ]
