services:
  secure_web:
    image: nginx:1.25-alpine
    container_name: level3_https
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend

  backend:
    image: hashicorp/http-echo
    container_name: level3_backend
    command: [ "-text=Secure Backend Data: Rate limiting is working!", "-listen=:8080" ]
